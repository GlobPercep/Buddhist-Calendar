<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Buddhist Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #1c1917;
    font-family: 'DM Sans', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  ::-webkit-scrollbar { display: none; }
  .phone {
    width: 390px;
    height: 844px;
    max-height: calc(100vh - 40px);
    background: #FFFBF5;
    border-radius: 44px;
    border: 10px solid #111;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 2px #2a2a2a;
    overflow: hidden;
    position: relative;
  }
  .notch {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 32px;
    background: #111;
    border-radius: 0 0 20px 20px;
    z-index: 200;
  }
  .screen {
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    padding-bottom: 90px;
  }
  @media (max-width: 430px) {
    body { padding: 0; background: #FFFBF5; }
    .phone { width: 100%; height: 100vh; max-height: 100vh; border: none; border-radius: 0; box-shadow: none; }
    .notch { display: none; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const T = {
  saffron: '#F59E0B', saffronLight: '#FEF3C7', saffronDark: '#D97706',
  teal: '#0D9488', tealLight: '#CCFBF1',
  purple: '#7C3AED', purpleLight: '#EDE9FE',
  rose: '#E11D48', roseLight: '#FFE4E6',
  blue: '#2563EB', blueLight: '#DBEAFE',
  bg: '#FFFBF5', card: '#FFFFFF',
  text: '#1C1917', textMuted: '#78716C', textFaint: '#A8A29E',
  border: '#F5F0EB',
  font: "'DM Sans', system-ui, sans-serif",
  serif: "'DM Serif Display', Georgia, serif",
};

const INITIAL_EVENTS = [
  { id: 1, name: 'Uposatha', subtitle: 'Full Moon', date: 'Apr 24', color: T.teal, colorLight: T.tealLight, icon: '🌕', type: 'uposatha', desc: 'The Uposatha (lunar observance day) is held on full moon, new moon, and quarter moon days. Lay practitioners keep the Eight Precepts and monastics recite the Patimokkha.', reminder: true },
  { id: 2, name: 'Vesak', subtitle: 'Triple Gem Day', date: 'May 12', color: T.saffron, colorLight: T.saffronLight, icon: '☸️', type: 'vesak', desc: 'Vesak celebrates the birth, enlightenment (Bodhi), and passing (Parinirvana) of Gautama Buddha. It falls on the full moon of the fourth lunar month — the holiest day in the Buddhist year.', reminder: true },
  { id: 3, name: 'Uposatha', subtitle: 'New Moon', date: 'May 26', color: T.teal, colorLight: T.tealLight, icon: '🌑', type: 'uposatha', desc: 'New moon Uposatha day. A time for reflection, meditation, and observing the precepts.', reminder: false },
  { id: 4, name: 'Magha Puja', subtitle: 'Sangha Day', date: 'Jun 11', color: T.purple, colorLight: T.purpleLight, icon: '🪷', type: 'magha', desc: 'Magha Puja commemorates the spontaneous gathering of 1,250 Arahants who came to hear the Buddha teach the Ovada-Patimokkha — the heart of Buddhist teaching.', reminder: true },
  { id: 5, name: 'Dharma Day', subtitle: 'First Teaching', date: 'Jul 10', color: T.blue, colorLight: T.blueLight, icon: '📿', type: 'dharma', desc: "Asalha Puja (Dharma Day) commemorates the Buddha's first teaching — the Dhammacakkappavattana Sutta — to the five ascetics in the Deer Park at Isipatana, setting the Wheel of Dhamma in motion.", reminder: true },
  { id: 6, name: 'Vassa Begins', subtitle: 'Rains Retreat', date: 'Jul 11', color: T.teal, colorLight: T.tealLight, icon: '🌧️', type: 'vassa', desc: 'Vassa is the three-month Rains Retreat observed by Theravada monastics. Monks and nuns stay within a fixed location for 3 lunar months, engaging in intensive meditation practice.', reminder: true },
  { id: 7, name: 'Ullambana', subtitle: 'Hungry Ghost Festival', date: 'Sep 6', color: T.rose, colorLight: T.roseLight, icon: '🕯️', type: 'ullambana', desc: 'Ullambana is observed on the 15th day of the 7th lunar month. Practitioners make offerings, chant sutras, and dedicate merit to ancestors and wandering spirits.', reminder: false },
  { id: 8, name: 'Vassa Ends', subtitle: 'Pavarana Day', date: 'Oct 6', color: T.teal, colorLight: T.tealLight, icon: '🌤️', type: 'vassa', desc: 'Pavarana marks the end of the Vassa retreat. Monastics invite each other to point out any faults seen, heard, or suspected — a ceremony of communal reflection and renewal.', reminder: true },
  { id: 9, name: 'Kathina', subtitle: 'Robe Offering', date: 'Oct 20', color: T.saffron, colorLight: T.saffronLight, icon: '🧡', type: 'kathina', desc: 'Kathina is the annual robe-offering ceremony held within one month after Vassa ends. Lay supporters offer robes and requisites to monastics, generating great merit for both givers and receivers.', reminder: true },
  { id: 10, name: 'Bodhi Day', subtitle: 'Enlightenment Day', date: 'Dec 8', color: T.purple, colorLight: T.purpleLight, icon: '🌳', type: 'bodhi', desc: 'Bodhi Day marks the date when Siddhartha Gautama sat beneath the Bodhi tree and attained full enlightenment, becoming the Buddha. Observed mainly in East Asian Buddhist traditions.', reminder: false },
];

const UPOSATHA_DATES = [
  { label: 'Full Moon', date: 'Apr 24', phase: '🌕' },
  { label: 'Waning Quarter', date: 'May 1', phase: '🌖' },
  { label: 'New Moon', date: 'May 8', phase: '🌑' },
  { label: 'Waxing Quarter', date: 'May 15', phase: '🌒' },
  { label: 'Full Moon', date: 'May 24', phase: '🌕' },
  { label: 'Waning Quarter', date: 'Jun 1', phase: '🌖' },
  { label: 'New Moon', date: 'Jun 6', phase: '🌑' },
];

const Screen = ({ children, bg = T.bg }) => (
  <div className="screen" style={{ background: bg }}>{children}</div>
);

const TabBar = ({ active, onNav }) => {
  const tabs = [
    { label: 'Home', key: 'home', color: T.saffron, icon: (a) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" fill={a ? T.saffron : 'none'} stroke={a ? T.saffron : T.textFaint} strokeWidth="1.8" strokeLinejoin="round"/><path d="M9 21V12h6v9" stroke={a ? T.saffron : T.textFaint} strokeWidth="1.8" strokeLinecap="round"/></svg> },
    { label: 'Calendar', key: 'calendar', color: T.saffron, icon: (a) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="17" rx="3" stroke={a ? T.saffron : T.textFaint} strokeWidth="1.8"/><path d="M3 9h18M8 2v4M16 2v4" stroke={a ? T.saffron : T.textFaint} strokeWidth="1.8" strokeLinecap="round"/><circle cx="8" cy="14" r="1.5" fill={a ? T.saffron : T.textFaint}/><circle cx="12" cy="14" r="1.5" fill={a ? T.saffron : T.textFaint}/><circle cx="16" cy="14" r="1.5" fill={a ? T.saffron : T.textFaint}/></svg> },
    { label: 'Vassa', key: 'vassa', color: T.teal, icon: (a) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 3C8 3 5 7 5 11c0 5 4 8 7 10 3-2 7-5 7-10 0-4-3-8-7-8z" fill={a ? T.teal : 'none'} stroke={a ? T.teal : T.textFaint} strokeWidth="1.8"/></svg> },
    { label: 'Remind', key: 'reminders', color: T.purple, icon: (a) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2a7 7 0 00-7 7c0 4-2 6-2 6h18s-2-2-2-6a7 7 0 00-7-7z" fill={a ? T.purple : 'none'} stroke={a ? T.purple : T.textFaint} strokeWidth="1.8" strokeLinejoin="round"/><path d="M10 19a2 2 0 004 0" stroke={a ? T.purple : T.textFaint} strokeWidth="1.8" strokeLinecap="round"/></svg> },
  ];
  return (
    <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0,
      background: 'rgba(255,251,245,0.92)', backdropFilter: 'blur(20px)',
      borderTop: `1px solid ${T.border}`,
      display: 'flex', height: 83, paddingBottom: 20, zIndex: 100,
    }}>
      {tabs.map((t) => {
        const a = t.key === active;
        return (
          <div key={t.key} onClick={() => onNav(t.key)} style={{
            flex: 1, display: 'flex', flexDirection: 'column',
            alignItems: 'center', justifyContent: 'center', gap: 3, paddingTop: 8,
            cursor: 'pointer',
          }}>
            {t.icon(a)}
            <span style={{ fontSize: 10, fontWeight: 500, color: a ? t.color : T.textFaint }}>{t.label}</span>
          </div>
        );
      })}
    </div>
  );
};

function HomeScreen({ onEvent }) {
  const upcoming = INITIAL_EVENTS.slice(0, 4);
  return (
    <Screen>
      <div style={{ padding: '56px 20px 0' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
          <div>
            <p style={{ fontSize: 13, color: T.textMuted, fontWeight: 500, letterSpacing: 0.3 }}>MONDAY, APRIL 20</p>
            <h1 style={{ fontFamily: T.serif, fontSize: 30, color: T.text, marginTop: 2 }}>Buddhist Calendar</h1>
          </div>
          <div style={{
            width: 42, height: 42, borderRadius: 21,
            background: `linear-gradient(135deg, ${T.saffron}, ${T.saffronDark})`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: `0 4px 12px ${T.saffron}50`,
          }}>
            <span style={{ fontSize: 20 }}>☸️</span>
          </div>
        </div>

        <div style={{
          marginTop: 16,
          background: `linear-gradient(135deg, ${T.saffron}15, ${T.teal}15)`,
          border: `1px solid ${T.saffron}30`,
          borderRadius: 16, padding: '12px 16px',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        }}>
          <div>
            <p style={{ fontSize: 11, color: T.textMuted, fontWeight: 600, letterSpacing: 0.5 }}>BUDDHIST ERA (BE)</p>
            <p style={{ fontSize: 24, fontWeight: 700, color: T.text, letterSpacing: -0.5 }}>2569</p>
          </div>
          <div style={{ textAlign: 'right' }}>
            <p style={{ fontSize: 11, color: T.textMuted, fontWeight: 600, letterSpacing: 0.5 }}>LUNAR MONTH</p>
            <p style={{ fontSize: 16, fontWeight: 700, color: T.teal }}>Vaisakha 🌕</p>
          </div>
        </div>
      </div>

      <div style={{ padding: '20px 20px 0' }}>
        <p style={{ fontSize: 12, fontWeight: 700, color: T.textMuted, letterSpacing: 0.8, marginBottom: 10 }}>COMING SOON</p>
        <div onClick={() => onEvent(INITIAL_EVENTS[1])} style={{
          background: `linear-gradient(135deg, #F59E0B, #D97706)`,
          borderRadius: 20, padding: '20px',
          boxShadow: '0 8px 24px #F59E0B40',
          position: 'relative', overflow: 'hidden', cursor: 'pointer',
        }}>
          <div style={{ position: 'absolute', right: -20, top: -20, width: 110, height: 110, borderRadius: 55, background: 'rgba(255,255,255,0.12)' }} />
          <div style={{ position: 'absolute', right: 20, top: 20, fontSize: 52, opacity: 0.35 }}>☸️</div>
          <div style={{
            display: 'inline-block', background: 'rgba(255,255,255,0.25)',
            borderRadius: 100, padding: '3px 12px', fontSize: 11, fontWeight: 700,
            color: '#fff', letterSpacing: 0.5, marginBottom: 8,
          }}>22 DAYS AWAY</div>
          <h2 style={{ color: '#fff', fontSize: 22, fontWeight: 700, fontFamily: T.serif }}>Vesak Day</h2>
          <p style={{ color: 'rgba(255,255,255,0.85)', fontSize: 13, marginTop: 3 }}>May 12 · Triple Gem Day</p>
          <p style={{ color: 'rgba(255,255,255,0.75)', fontSize: 12, marginTop: 8, lineHeight: 1.5 }}>Birth, Enlightenment & Parinirvana of the Buddha</p>
        </div>
      </div>

      <div style={{ padding: '20px 20px 0' }}>
        <p style={{ fontSize: 12, fontWeight: 700, color: T.textMuted, letterSpacing: 0.8, marginBottom: 12 }}>UPCOMING OBSERVANCES</p>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {upcoming.map(ev => (
            <div key={ev.id} onClick={() => onEvent(ev)} style={{
              background: T.card, borderRadius: 16, padding: '14px 16px',
              display: 'flex', alignItems: 'center', gap: 14,
              boxShadow: '0 1px 4px rgba(0,0,0,0.06)',
              border: `1px solid ${T.border}`, cursor: 'pointer',
            }}>
              <div style={{
                width: 46, height: 46, borderRadius: 14,
                background: ev.colorLight,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 22, flexShrink: 0,
              }}>{ev.icon}</div>
              <div style={{ flex: 1 }}>
                <p style={{ fontSize: 15, fontWeight: 600, color: T.text }}>{ev.name}</p>
                <p style={{ fontSize: 12, color: T.textMuted, marginTop: 1 }}>{ev.date} · {ev.subtitle}</p>
              </div>
              {ev.reminder && <div style={{ width: 8, height: 8, borderRadius: 4, background: ev.color, flexShrink: 0 }} />}
            </div>
          ))}
        </div>
      </div>

      <div style={{ padding: '20px 20px 0' }}>
        <div style={{ background: T.tealLight, borderRadius: 16, padding: '16px', border: `1px solid ${T.teal}20` }}>
          <p style={{ fontSize: 11, fontWeight: 700, color: T.teal, letterSpacing: 0.5, marginBottom: 6 }}>DAILY REFLECTION</p>
          <p style={{ fontSize: 14, color: T.text, lineHeight: 1.6, fontStyle: 'italic' }}>
            "Peace comes from within. Do not seek it without."
          </p>
          <p style={{ fontSize: 11, color: T.teal, marginTop: 6, fontWeight: 600 }}>— The Dhammapada</p>
        </div>
      </div>
    </Screen>
  );
}

function CalendarScreen({ onNav }) {
  const days = ['S','M','T','W','T','F','S'];
  const offset = 3;
  const totalDays = 30;
  const uposatha = [5, 12, 19, 24];

  return (
    <Screen>
      <div style={{ padding: '56px 20px 0' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div>
            <p style={{ fontSize: 13, color: T.textMuted, fontWeight: 500 }}>Buddhist Era 2569</p>
            <h1 style={{ fontFamily: T.serif, fontSize: 28, color: T.text, marginTop: 2 }}>April 2026</h1>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <div style={{ width: 36, height: 36, borderRadius: 18, background: T.border, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke={T.textMuted} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
            <div style={{ width: 36, height: 36, borderRadius: 18, background: T.saffron, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: `0 4px 10px ${T.saffron}50`, cursor: 'pointer' }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 3l5 5-5 5" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
          </div>
        </div>

        <div style={{
          marginTop: 14, background: T.card, borderRadius: 14, padding: '10px 14px',
          border: `1px solid ${T.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        }}>
          <span style={{ fontSize: 11, fontWeight: 600, color: T.textMuted }}>Vaisakha — Lunar Month 5</span>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <span style={{ fontSize: 16 }}>🌒</span>
            <span style={{ fontSize: 13, fontWeight: 600, color: T.text }}>Waxing</span>
          </div>
        </div>

        <div style={{ marginTop: 16, background: T.card, borderRadius: 20, padding: '16px', border: `1px solid ${T.border}` }}>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', marginBottom: 8 }}>
            {days.map((d, i) => (
              <div key={i} style={{ textAlign: 'center', fontSize: 11, fontWeight: 700, color: i===0||i===6 ? T.rose : T.textMuted, paddingBottom: 4 }}>{d}</div>
            ))}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '4px 0' }}>
            {Array(offset).fill(null).map((_, i) => <div key={`e${i}`} />)}
            {Array(totalDays).fill(null).map((_, i) => {
              const day = i + 1;
              const isToday = day === 20;
              const isUpo = uposatha.includes(day);
              const isMajor = day === 24;
              return (
                <div key={day} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2, padding: '3px 0' }}>
                  <div style={{
                    width: 34, height: 34, borderRadius: 17,
                    background: isToday ? T.saffron : isMajor ? T.teal : 'transparent',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    boxShadow: isToday ? `0 3px 8px ${T.saffron}50` : isMajor ? `0 3px 8px ${T.teal}40` : 'none',
                  }}>
                    <span style={{ fontSize: 14, fontWeight: isToday || isMajor ? 700 : 400, color: isToday || isMajor ? '#fff' : T.text }}>{day}</span>
                  </div>
                  <div style={{ width: 5, height: 5, borderRadius: 2.5, background: isUpo ? T.teal : 'transparent' }} />
                </div>
              );
            })}
          </div>
        </div>

        <div style={{ display: 'flex', gap: 16, marginTop: 12, flexWrap: 'wrap' }}>
          {[['Today', T.saffron], ['Major Event', T.teal], ['Uposatha', T.teal]].map(([l, c]) => (
            <div key={l} style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <div style={{ width: 10, height: 10, borderRadius: 5, background: c }} />
              <span style={{ fontSize: 11, color: T.textMuted, fontWeight: 500 }}>{l}</span>
            </div>
          ))}
        </div>

        <div onClick={() => onNav('uposatha')} style={{
          marginTop: 16, background: T.tealLight, borderRadius: 14, padding: '12px 14px',
          border: `1px solid ${T.teal}30`, display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer',
        }}>
          <span style={{ fontSize: 20 }}>🌕</span>
          <div style={{ flex: 1 }}>
            <p style={{ fontSize: 13, fontWeight: 700, color: T.teal }}>View Uposatha Days</p>
            <p style={{ fontSize: 11, color: T.textMuted }}>Eight Precepts & lunar observances</p>
          </div>
          <svg width="10" height="16" viewBox="0 0 10 16" fill="none"><path d="M2 2l6 6-6 6" stroke={T.teal} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>

        <p style={{ fontSize: 12, fontWeight: 700, color: T.textMuted, letterSpacing: 0.8, marginTop: 20, marginBottom: 10 }}>APRIL OBSERVANCES</p>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {[
            { date: 'Apr 5', phase: '🌒', label: 'Waxing Quarter Uposatha' },
            { date: 'Apr 12', phase: '🌑', label: 'New Moon Uposatha' },
            { date: 'Apr 19', phase: '🌖', label: 'Waning Quarter Uposatha' },
            { date: 'Apr 24', phase: '🌕', label: 'Full Moon Uposatha' },
          ].map(ev => (
            <div key={ev.date} style={{
              background: T.card, borderRadius: 12, padding: '12px 14px',
              display: 'flex', alignItems: 'center', gap: 12,
              border: `1px solid ${T.border}`,
            }}>
              <span style={{ fontSize: 20 }}>{ev.phase}</span>
              <div style={{ flex: 1 }}>
                <p style={{ fontSize: 13, fontWeight: 600, color: T.text }}>{ev.label}</p>
                <p style={{ fontSize: 11, color: T.textMuted }}>{ev.date}</p>
              </div>
              <div style={{ width: 8, height: 8, borderRadius: 4, background: T.teal }} />
            </div>
          ))}
        </div>
      </div>
    </Screen>
  );
}

function EventDetailScreen({ event, onBack, onToggleReminder }) {
  const ev = event;
  const darkEnd = ev.color === T.saffron ? '#B45309'
                : ev.color === T.teal ? '#0F766E'
                : ev.color === T.purple ? '#5B21B6'
                : ev.color === T.rose ? '#9F1239'
                : ev.color === T.blue ? '#1E3A8A' : '#333';
  return (
    <Screen bg="#fff">
      <div style={{
        background: `linear-gradient(160deg, ${ev.color} 0%, ${darkEnd} 100%)`,
        padding: '56px 24px 32px', position: 'relative', overflow: 'hidden',
      }}>
        <div style={{ position: 'absolute', right: -30, top: -30, width: 160, height: 160, borderRadius: 80, background: 'rgba(255,255,255,0.1)' }} />
        <div style={{ position: 'absolute', right: 40, bottom: -40, width: 100, height: 100, borderRadius: 50, background: 'rgba(255,255,255,0.08)' }} />
        <div onClick={onBack} style={{
          width: 36, height: 36, borderRadius: 18,
          background: 'rgba(255,255,255,0.2)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          marginBottom: 20, cursor: 'pointer',
        }}>
          <svg width="10" height="16" viewBox="0 0 10 16" fill="none"><path d="M8 2L2 8l6 6" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
        <div style={{ fontSize: 48, marginBottom: 8 }}>{ev.icon}</div>
        <div style={{ display: 'inline-block', background: 'rgba(255,255,255,0.25)', borderRadius: 100, padding: '4px 14px', fontSize: 11, fontWeight: 700, color: '#fff', letterSpacing: 0.5, marginBottom: 10 }}>
          {ev.type === 'uposatha' ? 'LUNAR OBSERVANCE' : 'MAJOR OBSERVANCE'}
        </div>
        <h1 style={{ color: '#fff', fontFamily: T.serif, fontSize: 34, lineHeight: 1.1 }}>{ev.name}</h1>
        <p style={{ color: 'rgba(255,255,255,0.85)', fontSize: 15, marginTop: 6 }}>{ev.subtitle} · {ev.date}, 2026</p>
      </div>

      <div style={{ padding: '24px 20px 0' }}>
        <p style={{ fontSize: 12, fontWeight: 700, color: T.textMuted, letterSpacing: 0.8, marginBottom: 12 }}>ABOUT</p>
        <p style={{ fontSize: 14, color: T.text, lineHeight: 1.7, marginBottom: 20 }}>{ev.desc}</p>

        {ev.type === 'vesak' && (
          <>

function App() {
  const [route, setRoute] = React.useState({ name: 'home' });
  const [events, setEvents] = React.useState(INITIAL_EVENTS);

  const toggleReminder = (id) => {
    setEvents(events.map(e => e.id === id ? { ...e, reminder: !e.reminder } : e));
    if (route.name === 'event') {
      const updated = events.find(e => e.id === id);
      if (updated) setRoute({ name: 'event', event: { ...updated, reminder: !updated.reminder } });
    }
  };

  const openEvent = (ev) => {
    const fresh = events.find(x => x.id === ev.id) || ev;
    setRoute({ name: 'event', event: fresh });
  };

  const nav = (key) => setRoute({ name: key });

  let content;
  let tab = route.name;
  if (route.name === 'home') content = <HomeScreen onEvent={openEvent} />;
  else if (route.name === 'calendar') content = <CalendarScreen onNav={nav} />;
  else if (route.name === 'uposatha') { content = <UposathaScreen />; tab = 'calendar'; }
  else if (route.name === 'vassa') content = <VassaScreen />;
  else if (route.name === 'reminders') content = <RemindersScreen events={events} onToggleReminder={toggleReminder} onEvent={openEvent} />;
  else if (route.name === 'event') { content = <EventDetailScreen event={route.event} onBack={() => setRoute({ name: 'home' })} onToggleReminder={toggleReminder} />; tab = 'home'; }

  return (
    <div className="phone">
      <div className="notch" />
      {content}
      <TabBar active={tab} onNav={nav} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
